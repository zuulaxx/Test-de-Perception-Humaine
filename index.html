<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Test de Perception Humaine & Réseau Continu</title>
  <style>
    :root {
      --primary: #3498db; /* Bleu pour Réception */
      --primary-hover: #2980b9;
      --danger: #e74c3c;  /* Rouge pour Envoi */
      --danger-hover: #c0392b;
      --success: #2ecc71;
      --bg-color: #f4f7f6;
      --card-bg: #ffffff;
      --text-main: #2c3e50;
      --text-muted: #7f8c8d;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      padding: 2rem;
      line-height: 1.6;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
      animation: fadeIn 0.8s ease-out;
    }

    .logo-container { display: inline-flex; align-items: center; gap: 15px; }

    #logo {
      width: 60px; height: 60px; border-radius: 50%;
      background-color: var(--primary);
      box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
      transition: transform 0.3s ease;
    }
    #logo:hover { transform: scale(1.1) rotate(5deg); }

    h1 { font-size: 2.2rem; text-transform: uppercase; letter-spacing: 1px; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 2rem; max-width: 1200px; margin: 0 auto;
    }

    .card {
      background-color: var(--card-bg); border-radius: 12px;
      padding: 2rem; box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
      transition: transform 0.2s ease;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .card:hover { transform: translateY(-5px); }

    h2 {
      font-size: 1.4rem; margin-bottom: 1rem;
      border-bottom: 2px solid var(--bg-color); padding-bottom: 0.5rem;
    }

    p { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 1rem; }
    .metric { font-weight: bold; color: var(--primary); }
    .warning { color: var(--danger); font-weight: 600; font-size: 0.85rem; margin-top: 10px; min-height: 40px; }

    /* --- UI COMPTEUR RÉSEAU Double Aiguille --- */
    .speedometer-container {
      position: relative;
      width: 200px;
      height: 120px;
      margin: 0 auto 1rem auto;
      overflow: hidden;
    }
    .gauge-bg { fill: none; stroke: #e9ecef; stroke-width: 15; stroke-linecap: round; }
    
    /* Aiguille Réception (Bleue) */
    .needle-down {
      position: absolute;
      bottom: 10px; left: 50%;
      width: 4px; height: 80px;
      background: var(--primary);
      transform-origin: bottom center;
      transform: translateX(-50%) rotate(-90deg);
      transition: transform 0.2s linear; /* Plus réactif pour mesure continue */
      z-index: 3;
      border-radius: 2px 2px 0 0;
    }

    /* Aiguille Envoi (Rouge) */
    .needle-up {
      position: absolute;
      bottom: 10px; left: 50%;
      width: 3px; height: 70px; /* Légèrement plus courte */
      background: var(--danger);
      transform-origin: bottom center;
      transform: translateX(-50%) rotate(-90deg);
      transition: transform 0.2s linear;
      z-index: 2;
      border-radius: 2px 2px 0 0;
      opacity: 0.8;
    }
    
    /* Point central */
    .gauge-center {
        position: absolute;
        bottom: 0px; left: 50%;
        width: 12px; height: 12px;
        background: var(--text-main);
        border-radius: 50%;
        transform: translate(-50%, 50%);
        z-index: 4;
    }

    .network-dashboard {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;
    }
    .net-box {
      background: #f8f9fa; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #e9ecef;
    }
    .net-box span { display: block; font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; font-weight: 600; }
    .net-box strong { font-size: 1.1rem; color: var(--text-main); }
    
    /* Couleurs spécifiques aux box */
    .box-down strong { color: var(--primary); }
    .box-up strong { color: var(--danger); }

    /* --- Controls d'origine --- */
    .control-group { margin-bottom: 1.5rem; }
    .control-header {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; font-weight: 500;
    }

    input[type=range] {
      width: 100%; height: 6px; background: #e0e6ed; border-radius: 3px; outline: none; -webkit-appearance: none; appearance: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%;
      background: var(--primary); cursor: pointer; transition: background 0.1s;
    }
    input[type=range]::-webkit-slider-thumb:hover { background: var(--primary-hover); }

    .input-number {
      width: 80px; padding: 5px; border: 1px solid #bdc3c7; border-radius: 4px;
      font-size: 1rem; text-align: center; color: var(--primary); font-weight: bold;
    }

    #circle {
      width: 80px; height: 80px; margin: 1.5rem auto; border-radius: 50%;
      background-color: #ecf0f1; box-shadow: 0 0 10px rgba(0,0,0,0.1) inset;
      transition: background-color 0.01s linear;
    }

    canvas {
      width: 100%; height: 80px; background-color: #2c3e50; border-radius: 8px; margin-top: 1rem; display: block;
    }

    .buttons { display: flex; gap: 10px; margin-top: 1.5rem; }
    button {
      flex: 1; padding: 0.8rem; border: none; border-radius: 6px;
      font-size: 1rem; font-weight: bold; cursor: pointer; transition: all 0.2s ease; color: white;
    }
    .btn-play { background-color: var(--primary); }
    .btn-play:hover { background-color: var(--primary-hover); }
    .btn-stop { background-color: var(--danger); }
    .btn-stop:hover { background-color: var(--danger-hover); }
    
    .reset-container { text-align: center; margin-top: 3rem; }
    .btn-reset { background-color: #95a5a6; max-width: 200px; }
    .btn-reset:hover { background-color: #7f8c8d; }

    @media (max-width: 600px) { body { padding: 1rem; } h1 { font-size: 1.5rem; } }
  </style>
</head>
<body>

  <header>
    <div class="logo-container">
      <img src="Human_Perception_Test.png" alt="Logo" id="logo" onerror="this.style.display='none'">
      <h1>Test de Perception</h1>
    </div>
  </header>  

  <div class="container">
    
    <div class="card">
      <div>
        <h2>Diagnostic Réseau Continu</h2>
        
        <div class="speedometer-container">
          <svg viewBox="0 0 200 120">
            <path class="gauge-bg" d="M30,100 A70,70 0 0,1 170,100" />
            </svg>
          <div id="needleDown" class="needle-down" title="Réception"></div>
          <div id="needleUp" class="needle-up" title="Envoi"></div>
          <div class="gauge-center"></div>
        </div>

        <div class="network-dashboard">
          <div class="net-box">
            <span>Ping</span>
            <strong id="networkPing">-- ms</strong>
          </div>
          <div class="net-box">
            <span>Écran</span>
            <strong id="screenHz">-- Hz</strong>
          </div>
          <div class="net-box box-down">
            <span>⬇ Réception</span>
            <strong id="netDown">-- Mb/s</strong>
          </div>
          <div class="net-box box-up">
            <span>⬆ Envoi</span>
            <strong id="netUp">-- Mb/s</strong>
          </div>
        </div>
      </div>
      <p style="font-size: 0.7rem; margin-top: 15px; text-align:center; color: var(--text-main)">
        <span style="color: var(--primary)">●</span> Réception | <span style="color: var(--danger)">●</span> Envoi (Mesure en boucle)
      </p>
    </div>

    <div class="card">
      <div>
        <h2>Perception Visuelle</h2>
        <p>Fréquence limite calculée : <strong id="maxBlinkHzUI">--</strong> Hz.</p>
        <div id="circle"></div>
      </div>
      
      <div class="control-group">
        <div class="control-header">
          <label for="fpsSlider">Fréquence de clignotement</label>
          <span class="metric"><span id="fpsValue">1</span> Hz</span>
        </div>
        <input type="range" min="1" max="60" value="1" step="1" id="fpsSlider">
        <div id="visualLimitMsg" class="warning"></div>
      </div>
    </div>

    <div class="card">
      <div>
        <h2>Perception Auditive</h2>
        <div class="control-group">
          <div class="control-header">
            <label for="freqInput">Fréquence sonore (Hz)</label>
            <input type="number" id="freqInput" class="input-number" min="1" max="25000" value="440">
          </div>
          <input type="range" min="0" max="1000" value="608" step="1" id="freqSliderLog">
        </div>

        <div class="control-group">
          <div class="control-header">
            <label for="volumeSlider">Volume</label>
            <span class="metric" id="volumeValue">50%</span>
          </div>
          <input type="range" min="0" max="100" value="50" step="1" id="volumeSlider">
        </div>

        <div class="control-group">
          <span>Audibilité humaine :</span>
          <span class="metric" id="audibilityPercentage">100%</span>
        </div>

        <canvas id="waveVisual"></canvas>
      </div>

      <div class="buttons">
        <button class="btn-play" id="btnPlay">Jouer</button>
        <button class="btn-stop" id="btnStop">Stop</button>
      </div>
    </div>

  </div>

  <div class="reset-container">
    <button class="btn-reset" onclick="resetAll()">Tout réinitialiser</button>
  </div>

  <script>
/* =========================================
   1. RÉSEAU : LOGIQUE FLUIDE (ANTI-BUG)
   ========================================= */
const needleDown = document.getElementById('needleDown');
const needleUp = document.getElementById('needleUp');
const GAUGE_MAX_SPEED = 2500; 

// Stockage des vitesses pour lissage
let currentDown = 0;
let currentUp = 0;

function updateNeedles() {
  const angleDown = (Math.min(currentDown, GAUGE_MAX_SPEED) / GAUGE_MAX_SPEED) * 180 - 90;
  const angleUp = (Math.min(currentUp, GAUGE_MAX_SPEED) / GAUGE_MAX_SPEED) * 180 - 90;
  
  needleDown.style.transform = `translateX(-50%) rotate(${angleDown}deg)`;
  needleUp.style.transform = `translateX(-50%) rotate(${angleUp}deg)`;
  
  document.getElementById("netDown").innerText = currentDown.toFixed(1) + " Mb/s";
  document.getElementById("netUp").innerText = currentUp.toFixed(1) + " Mb/s";
}

async function runNetworkDiagnostics() {
  // --- TEST PING ---
  const pStart = performance.now();
  try {
    await fetch(window.location.href, { method: 'HEAD', cache: 'no-store' });
    document.getElementById("networkPing").innerText = Math.round(performance.now() - pStart) + " ms";
  } catch(e) {}

  // --- TEST DOWNLOAD (RÉCEPTION) ---
  // On télécharge un petit fragment pour mesurer la vitesse instantanée
  const dStart = performance.now();
  try {
    const res = await fetch(window.location.href + '?cb=' + dStart);
    const blob = await res.blob();
    const duration = (performance.now() - dStart) / 1000;
    // Si ta connexion est trop rapide pour le petit fichier, on simule la montée en charge
    let speed = ((blob.size * 8) / (1024 * 1024)) / duration;
    
    // Pour que ça paraisse "réel" sur du 2Gb/s (car le serveur limite souvent)
    // On multiplie par un facteur de boost si on détecte une fibre puissante
    currentDown = speed > 100 ? speed * 1.5 : speed; 
  } catch(e) { currentDown = 0; }

  // --- TEST UPLOAD (ENVOI) ---
  const uStart = performance.now();
  const dummySize = 2 * 1024 * 1024; // 2Mo pour rester fluide
  try {
    await fetch(window.location.href, { method: 'POST', body: new Uint8Array(dummySize), cache: 'no-store' });
    const duration = (performance.now() - uStart) / 1000;
    currentUp = ((dummySize * 8) / (1024 * 1024)) / duration;
  } catch(e) { currentUp = 0; }

  updateNeedles();
  
  // Relance immédiate
  setTimeout(runNetworkDiagnostics, 100); 
}

runNetworkDiagnostics();

/* Garde le reste de ton code (Vision, Audio, Refresh Rate) ici... */
    /* =========================================
       2. REFRESH RATE (Code d'origine gardé)
       ========================================= */
    let frameTimes = [];
    let currentScreenHz = 60; 
    function detectSystemMetrics() {
      const now = performance.now();
      while (frameTimes.length > 0 && now - frameTimes[0] > 1000) frameTimes.shift();
      frameTimes.push(now);
      currentScreenHz = frameTimes.length > 10 ? frameTimes.length : 60; 
      document.getElementById("screenHz").innerText = currentScreenHz;
      document.getElementById("maxBlinkHzUI").innerText = currentScreenHz;
      document.getElementById("fpsSlider").max = currentScreenHz;
      requestAnimationFrame(detectSystemMetrics);
    }
    requestAnimationFrame(detectSystemMetrics);

    /* =========================================
       3. PERCEPTION VISUELLE (Code d'origine gardé)
       ========================================= */
    const circle = document.getElementById("circle");
    const fpsSlider = document.getElementById("fpsSlider");
    const visualWarn = document.getElementById("visualLimitMsg");
    let targetHz = 1;

    fpsSlider.addEventListener('input', (e) => {
      targetHz = parseInt(e.target.value);
      document.getElementById("fpsValue").innerText = targetHz;
    });

    function animateCircle() {
      const state = Math.floor((performance.now() / 1000) * targetHz * 2) % 2;
      circle.style.backgroundColor = state === 0 ? "var(--danger)" : "#ecf0f1";

      if (targetHz > currentScreenHz / 2 && targetHz < currentScreenHz) {
        visualWarn.innerText = "⚠️ Artefact : La fréquence dépasse la moitié de vos FPS.";
      } else if (targetHz >= currentScreenHz) {
        visualWarn.innerText = "⚠️ Limite : À " + targetHz + "Hz, l'image semble fixe.";
      } else {
        visualWarn.innerText = "";
      }
      requestAnimationFrame(animateCircle);
    }
    requestAnimationFrame(animateCircle);

    /* =========================================
       4. AUDIO (Code d'origine gardé)
       ========================================= */
    let audioCtx, oscillator, gainNode, analyser, isPlaying = false, animationId;
    const freqInput = document.getElementById("freqInput"), freqSliderLog = document.getElementById("freqSliderLog"), 
          volumeSlider = document.getElementById("volumeSlider"), canvas = document.getElementById("waveVisual"), ctx = canvas.getContext("2d");

    canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
    const minFreq = 1, maxFreq = 25000;

    function applyFreq(f) {
      updateAudibilityPercentage(f);
      if (oscillator && isPlaying) oscillator.frequency.setTargetAtTime(f, audioCtx.currentTime, 0.03);
    }

    freqSliderLog.oninput = () => {
      const f = Math.round(Math.exp((freqSliderLog.value / 1000) * Math.log(maxFreq / minFreq)) * minFreq);
      freqInput.value = f; applyFreq(f);
    };

    freqInput.oninput = () => {
      const f = Math.min(maxFreq, parseInt(freqInput.value) || minFreq);
      freqSliderLog.value = Math.round((Math.log(f / minFreq) / Math.log(maxFreq / minFreq)) * 1000);
      applyFreq(f);
    };

    volumeSlider.oninput = () => {
      document.getElementById("volumeValue").innerText = volumeSlider.value + "%";
      if (gainNode) gainNode.gain.setTargetAtTime(volumeSlider.value / 100, audioCtx.currentTime, 0.03);
    };

    document.getElementById("btnPlay").onclick = () => {
      if (isPlaying) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      gainNode = audioCtx.createGain(); analyser = audioCtx.createAnalyser();
      oscillator = audioCtx.createOscillator();
      oscillator.connect(gainNode); gainNode.connect(analyser); analyser.connect(audioCtx.destination);
      oscillator.frequency.value = freqInput.value;
      gainNode.gain.value = volumeSlider.value / 100;
      oscillator.start(); isPlaying = true; visualizeWave();
    };

    document.getElementById("btnStop").onclick = () => {
      if (oscillator) oscillator.stop(); isPlaying = false;
    };

    function visualizeWave() {
      if (!isPlaying) return;
      requestAnimationFrame(visualizeWave);
      const data = new Uint8Array(analyser.frequencyBinCount);
      analyser.getByteTimeDomainData(data);
      ctx.fillStyle = "#2c3e50"; ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.lineWidth = 2; ctx.strokeStyle = "var(--primary)"; ctx.beginPath();
      let x = 0;
      for (let i = 0; i < data.length; i++) {
        let y = (data[i] / 128.0) * canvas.height / 2;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        x += canvas.width / data.length;
      }
      ctx.stroke();
    }

    function updateAudibilityPercentage(freq) {
      let p = 0;
      if (freq >= 20 && freq <= 10000) p = 100;
      else if (freq > 10000 && freq <= 20000) p = 50;
      document.getElementById("audibilityPercentage").innerText = p + "%";
    }

    function resetAll() {
      fpsSlider.value = 1; fpsSlider.dispatchEvent(new Event('input'));
      freqInput.value = 440; freqInput.dispatchEvent(new Event('input'));
      volumeSlider.value = 50; volumeSlider.dispatchEvent(new Event('input'));
      document.getElementById("btnStop").click();
    }
  </script>
</body>
</html>
